name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*-*'
      - 'v*.*-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Parse version from tag
        id: version
        run: |
          # Tag format: v1.6-1
          FULL_VERSION="${GITHUB_REF_NAME#v}"
          TRAC_VERSION="${FULL_VERSION%-*}"
          echo "full_version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "trac_version=${TRAC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trac:${{ steps.version.outputs.full_version }}
            ghcr.io/${{ github.repository_owner }}/trac:${{ steps.version.outputs.trac_version }}
            ghcr.io/${{ github.repository_owner }}/trac:latest
